name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: airbarium_test
          POSTGRES_USER: airbarium
          POSTGRES_PASSWORD: dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U airbarium -d airbarium_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://airbarium:dev@localhost:5432/airbarium_test

    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Cache Bun deps
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install JS deps
        run: nix develop --command bun install --frozen-lockfile

      - name: Typecheck
        run: nix develop --command bun run typecheck

      - name: Lint
        run: nix develop --command bun run lint

      - name: Migrate DB
        run: nix develop --command bun run db:migrate

      - name: Test
        run: nix develop --command bun test
