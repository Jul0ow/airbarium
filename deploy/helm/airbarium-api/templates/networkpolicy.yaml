{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "airbarium-api.fullname" . }}
  labels:
    {{- include "airbarium-api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "airbarium-api.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Public API traffic from the Gateway namespace only.
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.gatewayNamespaceSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: http
    {{- with .Values.networkPolicy.scrapeNamespaceSelector }}
    # Metrics scraping from the monitoring namespace only.
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml . | nindent 14 }}
      ports:
        - protocol: TCP
          port: http
    {{- end }}
  egress:
    # DNS resolution.
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Outbound HTTPS (PlantNet, Wikipedia, external SMTP/S3).
    - to: []
      ports:
        - protocol: TCP
          port: 443
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
