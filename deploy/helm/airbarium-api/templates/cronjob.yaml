apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "airbarium-api.fullname" . }}-purge
  labels:
    {{- include "airbarium-api.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.cron.schedule | quote }}
  concurrencyPolicy: {{ .Values.cron.concurrencyPolicy }}
  startingDeadlineSeconds: {{ .Values.cron.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: {{ .Values.cron.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cron.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.cron.backoffLimit }}
      template:
        metadata:
          labels:
            {{- include "airbarium-api.selectorLabels" . | nindent 12 }}
        spec:
          serviceAccountName: {{ include "airbarium-api.serviceAccountName" . }}
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          restartPolicy: OnFailure
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: cron
              image: {{ include "airbarium-api.image" . }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["bun", "run", "cron"]
              envFrom:
                - configMapRef:
                    name: {{ include "airbarium-api.fullname" . }}
                - secretRef:
                    name: {{ include "airbarium-api.secretName" . }}
              resources:
                {{- toYaml .Values.cron.resources | nindent 16 }}
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
              {{- if .Values.securityContext.readOnlyRootFilesystem }}
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              {{- end }}
          {{- if .Values.securityContext.readOnlyRootFilesystem }}
          volumes:
            - name: tmp
              emptyDir: {}
          {{- end }}
