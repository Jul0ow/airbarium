{{- if .Values.migrations.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "airbarium-api.fullname" . }}-migrate
  labels:
    {{- include "airbarium-api.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
data:
  {{- include "airbarium-api.configData" . | nindent 2 }}
{{- if .Values.secret.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "airbarium-api.fullname" . }}-migrate
  labels:
    {{- include "airbarium-api.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
type: Opaque
stringData:
  {{- include "airbarium-api.secretData" . | nindent 2 }}
{{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "airbarium-api.fullname" . }}-migrate
  labels:
    {{- include "airbarium-api.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "airbarium-api.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "airbarium-api.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: {{ include "airbarium-api.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bun", "run", "db:migrate"]
          envFrom:
            - configMapRef:
                name: {{ include "airbarium-api.fullname" . }}-migrate
            - secretRef:
                name: {{ if .Values.secret.create }}{{ include "airbarium-api.fullname" . }}-migrate{{ else }}{{ required "secret.existingSecret is required when secret.create=false" .Values.secret.existingSecret }}{{ end }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if .Values.securityContext.readOnlyRootFilesystem }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- end }}
      {{- if .Values.securityContext.readOnlyRootFilesystem }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{- end }}
{{- end }}
